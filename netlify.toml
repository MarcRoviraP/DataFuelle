[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Background functions return 202 immediately and can run up to 15 minutes.
# Naming convention: must end in "-background" for Netlify to treat it as background.
# Required env vars in Netlify dashboard (Site config → Environment variables):
#   SUPABASE_URL               → https://msetjsrlioiysxmgybdg.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY  → service role key from Supabase → Settings → API
[functions."sync-miteco-cron-background"]
  schedule = "0 0,12 * * *"
[functions."predict_prices_cron_background"]
  schedule = "0 0 * * 1"
